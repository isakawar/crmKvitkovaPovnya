<div class="modal fade" id="writeoffModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered txn-modal-dialog">
    <div class="modal-content txn-modal-content">

      <div class="txn-modal-header">
        <div class="txn-modal-header-left">
          <div class="txn-modal-icon" style="background:#fff1f2;border-color:#fecdd3;color:#e11d48;">
            <i class="bi bi-dash-circle"></i>
          </div>
          <div>
            <h2 class="txn-modal-title">Списання</h2>
            <p class="txn-modal-subtitle">Витрати, що зменшують баланс</p>
          </div>
        </div>
        <button type="button" class="txn-close-btn" data-bs-dismiss="modal" aria-label="Закрити">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <form id="writeoffForm" novalidate autocomplete="off">
        <div class="txn-modal-body">
          <div id="writeoffErrors" class="hidden rounded-3 border border-danger-subtle bg-danger-subtle px-3 py-2 text-danger small"></div>

          <div class="txn-field">
            <label class="txn-label">Сума (грн)</label>
            <input type="number" id="writeoffAmount" name="amount" min="1" step="1" required placeholder="Наприклад: 200" class="txn-input">
          </div>

          <div class="txn-field">
            <label class="txn-label">Тип витрати</label>
            <div class="expense-combobox" id="expenseCombobox">
              <input type="text" id="expenseTypeSearch" class="txn-input" placeholder="Пошук типу витрати..." autocomplete="off">
              <ul class="expense-combobox__dropdown" id="expenseTypeDropdown" hidden></ul>
            </div>
            <input type="hidden" id="writeoffExpenseType" name="expense_type">
          <input type="hidden" id="writeoffExpenseTypeId" name="expense_type_id">
          </div>
          <style>
            .expense-combobox { position: relative; }
            .expense-combobox__dropdown {
              position: absolute;
              left: 0; right: 0;
              z-index: 1050;
              background: #fff;
              border: 1px solid #e2e8f0;
              border-radius: 0.5rem;
              box-shadow: 0 4px 16px rgba(0,0,0,.1);
              max-height: 220px;
              overflow-y: auto;
              margin: 0;
              padding: 0.25rem 0;
              list-style: none;
            }
            .expense-combobox__item {
              padding: 0.5rem 1rem;
              cursor: pointer;
              font-size: 0.9375rem;
              color: #1e293b;
            }
            .expense-combobox__item:hover,
            .expense-combobox__item--active { background: #f1f5f9; }
            .expense-combobox__empty {
              padding: 0.5rem 1rem;
              font-size: 0.875rem;
              color: #94a3b8;
            }
          </style>

          <div class="txn-field">
            <label class="txn-label">Коментар <span style="font-weight:400;text-transform:none;letter-spacing:0">(необов'язково)</span></label>
            <input type="text" id="writeoffComment" name="comment" placeholder="Опис витрати" class="txn-input">
          </div>

          <div class="txn-field">
            <label class="txn-label">Дата</label>
            <input type="date" id="writeoffDate" name="date" required class="txn-input">
          </div>
        </div>

        <div class="txn-modal-footer">
          <button type="button" data-bs-dismiss="modal" class="txn-btn txn-btn--ghost">Скасувати</button>
          <button type="submit" id="saveWriteoffBtn" class="txn-btn txn-btn--primary" style="background:#e11d48;">
            <i class="bi bi-dash-circle"></i>
            <span>Списати</span>
          </button>
        </div>
      </form>

    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const openBtn = document.getElementById('openWriteoffModal');
  const modalEl = document.getElementById('writeoffModal');
  const form = document.getElementById('writeoffForm');
  const saveBtn = document.getElementById('saveWriteoffBtn');
  const saveBtnLabel = saveBtn ? saveBtn.querySelector('span') : null;
  const errorsEl = document.getElementById('writeoffErrors');
  const writeoffDate = document.getElementById('writeoffDate');
  const searchInput = document.getElementById('expenseTypeSearch');
  const hiddenInput = document.getElementById('writeoffExpenseType');
  const hiddenIdInput = document.getElementById('writeoffExpenseTypeId');
  const dropdown = document.getElementById('expenseTypeDropdown');

  if (!openBtn || !modalEl || !form) return;

  const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
  let expenseTypes = [];
  let activeIndex = -1;

  async function loadExpenseTypes() {
    if (expenseTypes.length) return;
    try {
      const res = await fetch('/settings/expense_types');
      expenseTypes = await res.json();
    } catch (_) {}
  }

  function renderDropdown(filter) {
    const q = (filter || '').toLowerCase();
    const filtered = q
      ? expenseTypes.filter(t => t.value.toLowerCase().includes(q))
      : expenseTypes;
    dropdown.innerHTML = '';
    activeIndex = -1;
    if (!filtered.length) {
      const li = document.createElement('li');
      li.className = 'expense-combobox__empty';
      li.textContent = 'Нічого не знайдено';
      dropdown.appendChild(li);
    } else {
      filtered.forEach((t, i) => {
        const li = document.createElement('li');
        li.className = 'expense-combobox__item';
        li.textContent = t.value;
        li.dataset.value = t.value;
        li.dataset.id = t.id;
        li.addEventListener('mousedown', function (e) {
          e.preventDefault();
          selectType(t.value, t.id);
        });
        dropdown.appendChild(li);
      });
    }
    dropdown.hidden = false;
  }

  function selectType(value, id) {
    hiddenInput.value = value;
    hiddenIdInput.value = id || '';
    searchInput.value = value;
    dropdown.hidden = true;
    activeIndex = -1;
  }

  function clearSelection() {
    hiddenInput.value = '';
    hiddenIdInput.value = '';
    searchInput.value = '';
    dropdown.hidden = true;
    activeIndex = -1;
  }

  searchInput.addEventListener('focus', async function () {
    await loadExpenseTypes();
    renderDropdown(searchInput.value);
  });

  searchInput.addEventListener('input', function () {
    hiddenInput.value = '';
    renderDropdown(searchInput.value);
  });

  searchInput.addEventListener('keydown', function (e) {
    const items = dropdown.querySelectorAll('.expense-combobox__item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('expense-combobox__item--active', i === activeIndex));
      items[activeIndex]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      items.forEach((el, i) => el.classList.toggle('expense-combobox__item--active', i === activeIndex));
      items[activeIndex]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeIndex >= 0 && items[activeIndex]) {
        selectType(items[activeIndex].dataset.value, items[activeIndex].dataset.id);
      }
    } else if (e.key === 'Escape') {
      dropdown.hidden = true;
    }
  });

  document.addEventListener('click', function (e) {
    if (!e.target.closest('#expenseCombobox')) {
      dropdown.hidden = true;
    }
  });

  function todayISO() {
    return new Date().toISOString().slice(0, 10);
  }

  function setLoading(isLoading) {
    saveBtn.disabled = isLoading;
    if (saveBtnLabel) saveBtnLabel.textContent = isLoading ? 'Збереження...' : 'Списати';
  }

  function showErrors(messages) {
    const list = Array.isArray(messages) ? messages : [messages];
    errorsEl.innerHTML = list.filter(Boolean).map(m => `<p class="leading-relaxed">${m}</p>`).join('');
    errorsEl.classList.remove('hidden');
  }

  function clearErrors() {
    errorsEl.innerHTML = '';
    errorsEl.classList.add('hidden');
  }

  openBtn.addEventListener('click', async function () {
    form.reset();
    clearSelection();
    clearErrors();
    setLoading(false);
    writeoffDate.value = todayISO();
    await loadExpenseTypes();
    modal.show();
  });

  modalEl.addEventListener('hidden.bs.modal', function () {
    clearErrors();
    setLoading(false);
    clearSelection();
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    clearErrors();

    if (!hiddenInput.value) {
      showErrors('Оберіть тип витрати зі списку');
      return;
    }

    setLoading(true);

    const payload = {
      amount: document.getElementById('writeoffAmount').value,
      expense_type: hiddenInput.value,
      expense_type_id: hiddenIdInput.value || null,
      comment: document.getElementById('writeoffComment').value,
      date: writeoffDate.value,
    };

    try {
      const res = await fetch('/transactions/writeoff', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.success) {
        showErrors(data.errors || data.error || 'Помилка збереження');
        setLoading(false);
        return;
      }
      softReloadWithToast('Списання збережено', 'success');
    } catch (err) {
      showErrors('Не вдалося зберегти. Спробуйте ще раз.');
      setLoading(false);
    }
  });
});
</script>
