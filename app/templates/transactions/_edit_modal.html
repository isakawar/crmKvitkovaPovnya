<div class="modal fade" id="editTxnModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered txn-modal-dialog">
    <div class="modal-content txn-modal-content">

      <div class="txn-modal-header">
        <div class="txn-modal-header-left">
          <div class="txn-modal-icon" id="editTxnIcon">
            <i class="bi bi-pencil"></i>
          </div>
          <div>
            <h2 class="txn-modal-title" id="editTxnTitle">Редагування</h2>
            <p class="txn-modal-subtitle" id="editTxnSubtitle">Змініть поля та збережіть</p>
          </div>
        </div>
        <button type="button" class="txn-close-btn" data-bs-dismiss="modal" aria-label="Закрити">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>

      <form id="editTxnForm" novalidate autocomplete="off">
        <input type="hidden" id="editTxnId">
        <input type="hidden" id="editTxnType">

        <div class="txn-modal-body">
          <div id="editTxnErrors" class="hidden rounded-3 border border-danger-subtle bg-danger-subtle px-3 py-2 text-danger small"></div>

          <div class="txn-field">
            <label class="txn-label">Сума (грн)</label>
            <input type="number" id="editTxnAmount" name="amount" min="1" step="1" required class="txn-input">
          </div>

          <!-- credit fields -->
          <div id="editCreditFields">
            <div class="txn-field">
              <label class="txn-label">Тип оплати</label>
              <select id="editTxnPaymentType" name="payment_type" class="txn-select">
                <option value="monobank">Monobank</option>
                <option value="cash">Готівка</option>
              </select>
            </div>
          </div>

          <!-- debit fields -->
          <div id="editDebitFields" style="display:none;">
            <div class="txn-field">
              <label class="txn-label">Тип витрати</label>
              <div class="expense-combobox" id="editExpenseCombobox">
                <input type="text" id="editExpenseTypeSearch" class="txn-input" placeholder="Пошук типу витрати..." autocomplete="off">
                <ul class="expense-combobox__dropdown" id="editExpenseTypeDropdown" hidden></ul>
              </div>
              <input type="hidden" id="editTxnExpenseType" name="expense_type">
              <input type="hidden" id="editTxnExpenseTypeId" name="expense_type_id">
            </div>
          </div>

          <div class="txn-field">
            <label class="txn-label">Рахунок оплати</label>
            <select id="editTxnPaymentAccountId" name="payment_account_id" required class="txn-select">
              <option value="">— Оберіть рахунок —</option>
            </select>
          </div>

          <div class="txn-field">
            <label class="txn-label">Коментар <span style="font-weight:400;text-transform:none;letter-spacing:0">(необов'язково)</span></label>
            <input type="text" id="editTxnComment" name="comment" placeholder="Опис" class="txn-input">
          </div>

          <div class="txn-field">
            <label class="txn-label">Дата</label>
            <input type="date" id="editTxnDate" name="date" required class="txn-input">
          </div>
        </div>

        <div class="txn-modal-footer">
          <button type="button" data-bs-dismiss="modal" class="txn-btn txn-btn--ghost">Скасувати</button>
          <button type="submit" id="saveEditTxnBtn" class="txn-btn txn-btn--primary">
            <i class="bi bi-check-lg"></i>
            <span>Зберегти зміни</span>
          </button>
        </div>
      </form>

    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const modalEl = document.getElementById('editTxnModal');
  const form = document.getElementById('editTxnForm');
  const saveBtn = document.getElementById('saveEditTxnBtn');
  const saveBtnLabel = saveBtn.querySelector('span');
  const errorsEl = document.getElementById('editTxnErrors');
  const txnIdInput = document.getElementById('editTxnId');
  const txnTypeInput = document.getElementById('editTxnType');
  const amountInput = document.getElementById('editTxnAmount');
  const paymentTypeSelect = document.getElementById('editTxnPaymentType');
  const commentInput = document.getElementById('editTxnComment');
  const dateInput = document.getElementById('editTxnDate');
  const creditFields = document.getElementById('editCreditFields');
  const debitFields = document.getElementById('editDebitFields');
  const expenseSearch = document.getElementById('editExpenseTypeSearch');
  const expenseHidden = document.getElementById('editTxnExpenseType');
  const expenseHiddenId = document.getElementById('editTxnExpenseTypeId');
  const expenseDropdown = document.getElementById('editExpenseTypeDropdown');
  const iconEl = document.getElementById('editTxnIcon');
  const titleEl = document.getElementById('editTxnTitle');
  const subtitleEl = document.getElementById('editTxnSubtitle');

  const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
  const paymentAccountSelect = document.getElementById('editTxnPaymentAccountId');
  let expenseTypes = [];
  let activeIndex = -1;
  let paymentAccountsLoaded = false;

  async function loadPaymentAccounts() {
    if (paymentAccountsLoaded) return;
    try {
      const res = await fetch('/settings/payment_accounts');
      const accounts = await res.json();
      accounts.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.id;
        opt.textContent = a.value;
        paymentAccountSelect.appendChild(opt);
      });
      paymentAccountsLoaded = true;
    } catch (_) {}
  }

  async function loadExpenseTypes() {
    if (expenseTypes.length) return;
    try {
      const res = await fetch('/settings/expense_types');
      expenseTypes = await res.json();
    } catch (_) {}
  }

  function renderExpenseDropdown(filter) {
    const q = (filter || '').toLowerCase();
    const filtered = q ? expenseTypes.filter(t => t.value.toLowerCase().includes(q)) : expenseTypes;
    expenseDropdown.innerHTML = '';
    activeIndex = -1;
    if (!filtered.length) {
      const li = document.createElement('li');
      li.className = 'expense-combobox__empty';
      li.textContent = 'Нічого не знайдено';
      expenseDropdown.appendChild(li);
    } else {
      filtered.forEach(t => {
        const li = document.createElement('li');
        li.className = 'expense-combobox__item';
        li.textContent = t.value;
        li.dataset.value = t.value;
        li.dataset.id = t.id;
        li.addEventListener('mousedown', function (e) {
          e.preventDefault();
          selectExpenseType(t.value, t.id);
        });
        expenseDropdown.appendChild(li);
      });
    }
    expenseDropdown.hidden = false;
  }

  function selectExpenseType(value, id) {
    expenseHidden.value = value;
    expenseHiddenId.value = id || '';
    expenseSearch.value = value;
    expenseDropdown.hidden = true;
    activeIndex = -1;
  }

  expenseSearch.addEventListener('focus', async function () {
    await loadExpenseTypes();
    renderExpenseDropdown(expenseSearch.value);
  });

  expenseSearch.addEventListener('input', function () {
    expenseHidden.value = '';
    renderExpenseDropdown(expenseSearch.value);
  });

  expenseSearch.addEventListener('keydown', function (e) {
    const items = expenseDropdown.querySelectorAll('.expense-combobox__item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('expense-combobox__item--active', i === activeIndex));
      items[activeIndex]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      items.forEach((el, i) => el.classList.toggle('expense-combobox__item--active', i === activeIndex));
      items[activeIndex]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeIndex >= 0 && items[activeIndex]) selectExpenseType(items[activeIndex].dataset.value, items[activeIndex].dataset.id);
    } else if (e.key === 'Escape') {
      expenseDropdown.hidden = true;
    }
  });

  document.addEventListener('click', function (e) {
    if (!e.target.closest('#editExpenseCombobox')) expenseDropdown.hidden = true;
  });

  function setLoading(isLoading) {
    saveBtn.disabled = isLoading;
    saveBtnLabel.textContent = isLoading ? 'Збереження...' : 'Зберегти зміни';
  }

  function showErrors(messages) {
    const list = Array.isArray(messages) ? messages : [messages];
    errorsEl.innerHTML = list.filter(Boolean).map(m => `<p class="leading-relaxed">${m}</p>`).join('');
    errorsEl.classList.remove('hidden');
  }

  function clearErrors() {
    errorsEl.innerHTML = '';
    errorsEl.classList.add('hidden');
  }

  function applyType(type) {
    if (type === 'credit') {
      creditFields.style.display = '';
      debitFields.style.display = 'none';
      iconEl.style.cssText = 'background:#f0fdf4;border-color:#bbf7d0;color:#16a34a;';
      titleEl.textContent = 'Редагувати поповнення';
      subtitleEl.textContent = 'Змініть деталі транзакції';
    } else {
      creditFields.style.display = 'none';
      debitFields.style.display = '';
      iconEl.style.cssText = 'background:#fff1f2;border-color:#fecdd3;color:#e11d48;';
      titleEl.textContent = 'Редагувати списання';
      subtitleEl.textContent = 'Змініть деталі витрати';
    }
  }

  window.openEditTxnModal = async function (txnId) {
    clearErrors();
    setLoading(false);

    try {
      const res = await fetch(`/transactions/${txnId}`);
      if (!res.ok) { showErrors('Не вдалося завантажити дані'); return; }
      const txn = await res.json();

      txnIdInput.value = txn.id;
      txnTypeInput.value = txn.transaction_type;
      amountInput.value = txn.amount;
      commentInput.value = txn.comment || '';
      dateInput.value = txn.date;

      applyType(txn.transaction_type);

      await loadPaymentAccounts();
      paymentAccountSelect.value = txn.payment_account_id || '';

      if (txn.transaction_type === 'credit') {
        paymentTypeSelect.value = txn.payment_type || 'monobank';
      } else {
        await loadExpenseTypes();
        selectExpenseType(txn.expense_type || '', txn.expense_type_id || '');
      }

      modal.show();
    } catch (err) {
      showErrors('Помилка завантаження даних');
    }
  };

  modalEl.addEventListener('hidden.bs.modal', function () {
    clearErrors();
    setLoading(false);
    expenseDropdown.hidden = true;
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    clearErrors();

    const type = txnTypeInput.value;
    if (type === 'debit' && !expenseHidden.value) {
      showErrors('Оберіть тип витрати зі списку');
      return;
    }
    if (!paymentAccountSelect.value) {
      showErrors('Оберіть рахунок оплати');
      return;
    }

    setLoading(true);

    const payload = {
      amount: amountInput.value,
      date: dateInput.value,
      comment: commentInput.value,
      payment_account_id: paymentAccountSelect.value,
    };

    if (type === 'credit') {
      payload.payment_type = paymentTypeSelect.value;
    } else {
      payload.expense_type = expenseHidden.value;
      payload.expense_type_id = expenseHiddenId.value || null;
    }

    try {
      const res = await fetch(`/transactions/${txnIdInput.value}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.success) {
        showErrors(data.errors || data.error || 'Помилка збереження');
        setLoading(false);
        return;
      }
      softReloadWithToast('Зміни збережено', 'success');
    } catch (err) {
      showErrors('Не вдалося зберегти. Спробуйте ще раз.');
      setLoading(false);
    }
  });
});
</script>
