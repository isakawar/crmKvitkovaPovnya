<div class="modal fade" id="clientModal" tabindex="-1" aria-labelledby="clientModalLabel" aria-describedby="clientModalDescription" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable client-modal-dialog">
    <div class="modal-content client-modal-content">
      <form id="addClientForm" novalidate>
        <div class="client-modal-shell">
          <div class="client-modal-header">
            <div class="client-modal-head-copy">
              <span class="client-mode-chip" id="client-modal-mode-badge">
                <i class="bi bi-person-plus"></i>
                Новий клієнт
              </span>
              <div>
                <h2 class="text-xl font-semibold text-stone-900 md:text-2xl" id="clientModalLabel">Створити клієнта</h2>
                <p class="mt-1 text-sm text-stone-500" id="clientModalDescription"></p>
              </div>
            </div>

            <button type="button" class="client-modal-close" data-bs-dismiss="modal" aria-label="Закрити">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>

          <div class="client-modal-body">
            <input type="hidden" id="client-id" name="client_id">

            <div class="client-form-grid">
              <!-- LEFT PANEL: Contacts -->
              <section class="client-panel client-panel-primary">
                <div>
                  <span class="client-section-kicker">
                    <i class="bi bi-chat-heart"></i>
                    Контакти
                  </span>
                  <h3 class="mt-3 text-lg font-semibold text-stone-900">Канали комунікації</h3>
                  <p class="mt-1 text-xs text-stone-400">Вкажіть хоча б один контакт — Instagram, Telegram або телефон</p>
                </div>

                <div class="mt-5 space-y-4">

                  <!-- Name (first) -->
                  <div class="client-field">
                    <label class="client-label" for="edit-name">
                      <i class="bi bi-person"></i>
                      Ім'я
                      <span class="text-stone-400 font-normal text-xs ml-1">(необов'язково)</span>
                    </label>
                    <div class="client-input-wrap">
                      <input
                        type="text"
                        name="name"
                        id="edit-name"
                        class="client-input"
                        placeholder="Як звати клієнта"
                        autocomplete="off"
                      >
                    </div>
                    <p class="client-field-error"></p>
                  </div>

                  <!-- Nick fields (always visible) -->
                  <div class="client-field">
                    <label class="client-label" for="nick-input-1">
                      <i class="bi bi-at"></i>
                      Instagram / Telegram нік
                    </label>
                    <!-- Slot 1 -->
                    <div id="nick-slot-1">
                      <div class="client-input-wrap">
                        <button type="button" id="nick-platform-btn-1"
                                class="client-nick-platform-btn"
                                title="Змінити платформу (Instagram / Telegram)">
                          <i class="bi bi-instagram" id="nick-platform-icon-1"></i>
                        </button>
                        <input type="hidden" name="nick_platform_1" id="nick-platform-val-1" value="instagram">
                        <input
                          type="text"
                          id="nick-input-1"
                          class="client-input client-input-with-icon"
                          placeholder="username"
                          autocomplete="off"
                        >
                      </div>
                    </div>
                    <p class="client-field-error mt-1" id="nick-error-1"></p>
                    <!-- Slot 2 -->
                    <div id="nick-slot-2" class="mt-2">
                      <div class="client-input-wrap">
                        <button type="button" id="nick-platform-btn-2"
                                class="client-nick-platform-btn"
                                title="Змінити платформу (Instagram / Telegram)">
                          <i class="bi bi-telegram" id="nick-platform-icon-2"></i>
                        </button>
                        <input type="hidden" name="nick_platform_2" id="nick-platform-val-2" value="telegram">
                        <input
                          type="text"
                          id="nick-input-2"
                          class="client-input client-input-with-icon"
                          placeholder="@username"
                          autocomplete="off"
                        >
                      </div>
                    </div>
                    <p class="client-field-error mt-1" id="nick-error-2"></p>
                  </div>

                  <!-- Hidden actual inputs that get submitted -->
                  <input type="hidden" name="instagram" id="field-instagram">
                  <input type="hidden" name="telegram" id="field-telegram">

                  <!-- Phone -->
                  <div class="client-field">
                    <label class="client-label" for="edit-phone">
                      <i class="bi bi-telephone"></i>
                      Номер телефону
                    </label>
                    <div class="client-input-wrap">
                      <i class="bi bi-phone client-input-icon"></i>
                      <input
                        type="tel"
                        name="phone"
                        id="edit-phone"
                        class="client-input client-input-with-icon client-input-with-action"
                        placeholder="+380XXXXXXXXX"
                        value="+380"
                        autocomplete="tel"
                      >
                      <button type="button" id="clear-phone-btn" class="client-clear-btn hidden" tabindex="-1" aria-label="Очистити телефон">
                        <i class="bi bi-x"></i>
                      </button>
                    </div>
                    <!-- Messenger toggles: dimmed when phone empty -->
                    <div class="mt-3 transition-opacity duration-150" id="phone-messengers">
                      <p class="text-xs text-stone-400 mb-1.5">Месенджери для цього номера</p>
                      <div class="client-toggle-grid">
                        <label class="client-toggle">
                          <input type="checkbox" name="phone_viber" id="phone-viber" class="client-toggle-input">
                          <span class="client-toggle-card">
                            <span class="inline-flex h-4 w-4 items-center justify-center rounded-full bg-violet-500 text-[10px] font-bold leading-none text-white">V</span>
                            Viber
                          </span>
                        </label>
                        <label class="client-toggle">
                          <input type="checkbox" name="phone_telegram" id="phone-telegram-check" class="client-toggle-input">
                          <span class="client-toggle-card">
                            <i class="bi bi-telegram text-sky-500 text-sm"></i>
                            Telegram
                          </span>
                        </label>
                        <label class="client-toggle">
                          <input type="checkbox" name="phone_whatsapp" id="phone-whatsapp" class="client-toggle-input">
                          <span class="client-toggle-card">
                            <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor" style="color:#25d366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                            WhatsApp
                          </span>
                        </label>
                      </div>
                    </div>
                    <p class="client-field-error"></p>
                  </div>

                </div>
              </section>

              <!-- RIGHT PANEL: Loyalty -->
              <section class="client-panel flex flex-col">
                <span class="client-section-kicker client-section-kicker-muted">
                  <i class="bi bi-stars"></i>
                  Лояльність
                </span>
                <h3 class="mt-3 text-lg font-semibold text-stone-900">Баланс та джерело</h3>

                <div class="mt-5 space-y-4 flex-1">
                  <!-- Marketing source first -->
                  <div class="client-field">
                    <label class="client-label" for="edit-marketing-source">
                      <i class="bi bi-megaphone"></i>
                      Звідки дізнались
                    </label>
                    <div class="client-input-wrap">
                      <select
                        name="marketing_source"
                        id="edit-marketing-source"
                        class="client-select client-input-with-action"
                      >
                        <option value="">Оберіть варіант</option>
                        {% if marketing_sources and marketing_sources|length > 0 %}
                          {% for src in marketing_sources %}
                            <option value="{{ src.value }}">{{ src.value }}</option>
                          {% endfor %}
                        {% else %}
                          <option disabled>Додайте варіанти у налаштуваннях</option>
                        {% endif %}
                      </select>
                      <i class="bi bi-chevron-down client-select-icon"></i>
                    </div>
                    <p class="client-field-error"></p>
                  </div>

                  <!-- Balance + Discount -->
                  <div class="client-two-col">
                    <div class="client-field client-field-compact">
                      <label class="client-label" for="edit-credits">
                        <i class="bi bi-wallet2"></i>
                        Баланс
                      </label>
                      <div class="client-input-wrap mt-1">
                        <input
                          type="number"
                          name="credits"
                          id="edit-credits"
                          min="0"
                          class="client-input"
                          placeholder="0"
                          inputmode="numeric"
                        >
                      </div>
                      <p class="client-field-error"></p>
                    </div>

                    <div class="client-field client-field-compact">
                      <label class="client-label" for="edit-personal-discount">
                        <i class="bi bi-percent"></i>
                        Знижка
                      </label>
                      <div class="client-input-wrap mt-1">
                        <input
                          type="number"
                          name="personal_discount"
                          id="edit-personal-discount"
                          min="0"
                          max="100"
                          step="1"
                          class="client-input"
                          placeholder="0"
                          inputmode="numeric"
                        >
                      </div>
                      <p class="client-field-error"></p>
                    </div>
                  </div>

                  <!-- Created at (edit mode only) -->
                  <div class="client-field hidden" id="client-created-at-row">
                    <label class="client-label">
                      <i class="bi bi-calendar-check"></i>
                      Дата реєстрації
                    </label>
                    <div class="client-input-wrap">
                      <input type="text" id="client-created-at-display" class="client-input" readonly
                             style="background:#fafaf9; cursor:default; color:#57534e;">
                    </div>
                  </div>

                  <!-- Email -->
                  <div class="client-field">
                    <label class="client-label" for="edit-email">
                      <i class="bi bi-envelope"></i>
                      Email
                      <span class="text-stone-400 font-normal text-xs ml-1">(необов'язково)</span>
                    </label>
                    <div class="client-input-wrap">
                      <i class="bi bi-envelope client-input-icon"></i>
                      <input
                        type="email"
                        name="email"
                        id="edit-email"
                        class="client-input client-input-with-icon"
                        placeholder="example@email.com"
                        autocomplete="email"
                      >
                    </div>
                    <p class="client-field-error"></p>
                  </div>
                </div>

              </section>
            </div>

            <div id="client-error" class="client-error-banner" role="alert"></div>
          </div>

          <div class="client-modal-footer">
            <p class="client-footer-copy hidden" id="client-footer-copy"></p>

            <div class="flex items-center justify-between gap-3 w-full">
              <button type="button" id="delete-client-btn"
                      class="client-btn-danger-icon hidden"
                      title="Видалити клієнта">
                <i class="bi bi-trash3"></i>
              </button>
              <div class="flex flex-col-reverse gap-3 sm:flex-row ml-auto">
                <button type="button" class="client-btn-secondary" data-bs-dismiss="modal">
                  Скасувати
                </button>
                <button type="button" id="add-subscription-btn" class="client-btn-subscription" disabled>
                  Додати підписку
                </button>
                <button type="submit" id="submit-btn" class="client-btn-primary">
                  <span id="submit-btn-text">Створити клієнта</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
