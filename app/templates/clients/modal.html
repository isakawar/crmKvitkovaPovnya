<!-- Client Add/Edit Modal (Bootstrap modal + Tailwind styling) -->
<div class="modal fade" id="clientModal" tabindex="-1" aria-labelledby="clientModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-2xl shadow-2xl overflow-hidden">
      <form id="addClientForm">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-stone-200">
          <h5 class="text-base font-semibold text-stone-900" id="clientModalLabel">Додати клієнта</h5>
          <button type="button" class="text-stone-400 hover:text-stone-600 transition-colors p-1" data-bs-dismiss="modal">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>

        <!-- Body -->
        <div class="px-6 py-4 space-y-4">
          <input type="hidden" id="client-id" name="client_id">

          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1.5">
              Instagram <span class="text-red-500">*</span>
            </label>
            <input type="text" name="instagram" id="edit-instagram"
                   class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-colors"
                   required>
          </div>

          <div class="relative">
            <label class="block text-sm font-medium text-stone-700 mb-1.5">Номер телефону</label>
            <div class="relative">
              <input type="text" name="phone" id="edit-phone"
                     placeholder="+38"
                     pattern="\+380[0-9]{9}"
                     class="w-full px-3 py-2 pr-8 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-colors">
              <button type="button" id="clear-phone-btn"
                      class="absolute right-2 top-1/2 -translate-y-1/2 text-stone-300 hover:text-stone-500 transition-colors"
                      tabindex="-1">&times;</button>
            </div>
            <p class="text-xs text-stone-400 mt-1">Формат: +380XXXXXXXXX</p>
          </div>

          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1.5">Telegram</label>
            <input type="text" name="telegram" id="edit-telegram"
                   placeholder="Необов'язково"
                   class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-colors">
          </div>

          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1.5">Кредити</label>
            <input type="number" name="credits" id="edit-credits" min="0"
                   class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-colors">
          </div>

          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1.5">Звідки дізнались</label>
            <select name="marketing_source" id="edit-marketing-source"
                    class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-colors appearance-none">
              <option value="">Оберіть варіант</option>
              {% if marketing_sources and marketing_sources|length > 0 %}
                {% for src in marketing_sources %}
                  <option value="{{ src.value }}">{{ src.value }}</option>
                {% endfor %}
              {% else %}
                <option disabled>Додайте варіанти у налаштуваннях</option>
              {% endif %}
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-stone-700 mb-1.5">Персональна знижка</label>
            <input type="number" name="personal_discount" id="edit-personal-discount"
                   placeholder="Наприклад: 5" min="0" max="100" step="1"
                   class="w-full px-3 py-2 bg-stone-50 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-colors">
          </div>

          <div id="client-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
        </div>

        <!-- Footer -->
        <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-stone-200 bg-stone-50">
          <button type="button"
                  class="px-4 py-2 text-sm font-medium text-stone-700 bg-white border border-stone-200 rounded-lg hover:bg-stone-50 transition-colors"
                  data-bs-dismiss="modal">
            Скасувати
          </button>
          <button type="submit" id="submit-btn"
                  class="px-4 py-2 text-sm font-medium text-white bg-stone-900 rounded-lg hover:bg-stone-700 transition-colors">
            Додати
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="notification-toast" class="toast" role="alert">
    <div class="toast-header">
      <i class="me-2"></i>
      <strong class="me-auto">Сповіщення</strong>
      <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
    </div>
    <div class="toast-body"></div>
  </div>
</div>
