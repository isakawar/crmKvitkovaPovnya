<div class="modal fade" id="extendOrderModal" tabindex="-1" aria-labelledby="extendOrderModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <form id="extendOrderForm">
        <div class="modal-header">
          <h5 class="modal-title" id="extendOrderModalLabel">Продовження підписки</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" name="delivery_id" value="{{ delivery.id }}">
          <div class="mb-3">
            <label>Instagram клієнта</label>
            <input type="text" class="form-control" name="client_instagram" value="{{ client.instagram }}" required>
          </div>
          <div class="mb-3">
            <label>Ім'я отримувача</label>
            <input type="text" class="form-control" name="recipient_name" value="{{ order.recipient_name }}" required>
          </div>
          <div class="mb-3">
            <label>Телефон отримувача</label>
            <input type="text" class="form-control" name="recipient_phone" value="{{ order.recipient_phone }}" required>
          </div>
          <div class="mb-3" style="position: relative;">
            <label>Населений пункт</label>
            <input type="text" name="city" id="extend-city-input"
                   class="form-control" placeholder="Введіть місто або село"
                   value="{{ order.city or '' }}" required autocomplete="off">
            <div id="extend-city-dropdown" class="city-autocomplete-dropdown" style="display:none;"></div>
          </div>
          <div class="mb-3">
            <label>Адреса</label>
            <input type="text" class="form-control" name="street" value="{{ order.street }}">
          </div>
          <div class="mb-3">
            <label>Тип доставки</label>
            <select name="delivery_type" class="form-select" required>
              {% for t in delivery_types %}
                <option value="{{ t.value }}" {% if order.subscription and order.subscription.type == t.value %}selected{% endif %}>{{ t.value }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label>Розмір</label>
            <select name="size" class="form-select" required>
              {% for s in sizes %}
                <option value="{{ s.value }}" {% if order.size == s.value %}selected{% endif %}>{{ s.value }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label>День тижня</label>
            <select name="delivery_day" class="form-select" required>
              <option value="ПН" {% if order.subscription and order.subscription.delivery_day == 'ПН' %}selected{% endif %}>ПН</option>
              <option value="ВТ" {% if order.subscription and order.subscription.delivery_day == 'ВТ' %}selected{% endif %}>ВТ</option>
              <option value="СР" {% if order.subscription and order.subscription.delivery_day == 'СР' %}selected{% endif %}>СР</option>
              <option value="ЧТ" {% if order.subscription and order.subscription.delivery_day == 'ЧТ' %}selected{% endif %}>ЧТ</option>
              <option value="ПТ" {% if order.subscription and order.subscription.delivery_day == 'ПТ' %}selected{% endif %}>ПТ</option>
              <option value="СБ" {% if order.subscription and order.subscription.delivery_day == 'СБ' %}selected{% endif %}>СБ</option>
              <option value="НД" {% if order.subscription and order.subscription.delivery_day == 'НД' %}selected{% endif %}>НД</option>
            </select>
          </div>
          <div class="mb-3">
            <label>Для кого</label>
            <select name="for_whom" class="form-select" required>
              {% for f in for_whom %}
                <option value="{{ f.value }}" {% if order.for_whom == f.value %}selected{% endif %}>{{ f.value }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label>Коментар</label>
            <textarea name="comment" class="form-control"></textarea>
          </div>
          <div class="mb-3">
            <label>Побажання</label>
            <textarea name="preferences" class="form-control">{{ order.preferences }}</textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
          <button type="submit" class="btn btn-primary">Продовжити підписку</button>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
(function () {
  var inp = document.getElementById('extend-city-input');
  var drp = document.getElementById('extend-city-dropdown');
  if (inp && drp && typeof initCityAutocomplete === 'function') {
    initCityAutocomplete(inp, drp);
  }
})();
</script>
