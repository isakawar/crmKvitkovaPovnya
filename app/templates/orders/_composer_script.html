<script>
document.addEventListener('DOMContentLoaded', function() {
    const addOrderModalElement = document.getElementById('addOrderModal');
    const addOrderForm = document.getElementById('addOrderForm');
    if (!addOrderModalElement || !addOrderForm) {
        return;
    }

    const addOrderModal = bootstrap.Modal.getOrCreateInstance(addOrderModalElement);
    const extendSubscriptionModalElement = document.getElementById('extendSubscriptionModal');
    const extendModal = extendSubscriptionModalElement
        ? bootstrap.Modal.getOrCreateInstance(extendSubscriptionModalElement)
        : null;
    const subscriptionTypes = ['Weekly', 'Monthly', 'Bi-weekly'];

    const clientSearch = document.getElementById('client-search');
    const clientResults = document.getElementById('client-results');
    const clientInfoBlock = document.getElementById('client-info-block');
    const clientCreditsDisplay = document.getElementById('client-credits-display');
    const clientDiscountInput = document.getElementById('client-discount-input');
    const addressInput = document.getElementById('address-input');
    const addressField = document.getElementById('address-field');
    const addressLabel = document.getElementById('address-label');
    const addressHint = document.getElementById('address-hint');
    const addressCommentField = document.getElementById('address-comment-field');
    const addressCommentInput = document.getElementById('address-comment-input');
    const citySelect = document.getElementById('order-city-select');
    const cityField = citySelect ? citySelect.closest('.order-field') : null;
    const cityDropdown = document.getElementById('order-city-dropdown');
    if (citySelect && cityDropdown && typeof initCityAutocomplete === 'function') {
        initCityAutocomplete(citySelect, cityDropdown);
    }
    const deliveryMethodInput = document.getElementById('delivery-method-input');
    const pickupInput = document.getElementById('is-pickup-input');
    const deliveryModeHint = document.getElementById('delivery-mode-hint');
    const deliveryModeButtons = Array.from(document.querySelectorAll('[data-delivery-mode]'));
    const scenarioInput = document.getElementById('order-scenario-input');
    const scenarioButtons = Array.from(document.querySelectorAll('[data-composer-scenario]'));
    const scenarioCopy = document.getElementById('order-scenario-copy');
    const deliveryTypeField = document.getElementById('delivery-type-field');
    const deliveryTypeSelect = document.getElementById('delivery-type-select');
    const deliveryTypeLabel = document.getElementById('delivery-type-label');
    const deliveryDayField = document.getElementById('delivery-day-field');
    const deliveryDaySelect = document.getElementById('delivery-day-select');
    const firstDeliveryLabel = document.getElementById('first-delivery-label');
    const sizeSelect = document.getElementById('size-select');
    const customAmountDiv = document.getElementById('custom-amount-div');
    const customAmountInput = document.getElementById('custom-amount-input');
    const recipientPhoneInput = document.getElementById('recipient-phone-input');
    const addExtraPhoneBtn = document.getElementById('add-extra-phone-btn');
    const extraPhonesContainer = document.getElementById('extra-phones-container');
    const orderModalTitle = document.getElementById('order-modal-title');
    const orderModalDescription = document.getElementById('order-modal-description');
    const orderFlowChip = document.getElementById('order-flow-chip');
    const orderFooterCopy = document.getElementById('order-footer-copy');
    const orderSubmitBtn = document.getElementById('order-submit-btn');
    const orderSubmitBtnText = document.getElementById('order-submit-btn-text');
    const composerBackBtn = document.getElementById('order-back-btn');
    const orderErrorBanner = document.getElementById('add-order-error');
    const orderClientIdInput = document.getElementById('order-client-id');
    const extendFromInput = document.getElementById('extend-from-order-id');
    const extendHeaderBtn = document.getElementById('extend-subscription-header-btn');
    const confirmExtendBtn = document.getElementById('confirmExtendBtn');
    const extendClientInstagram = document.getElementById('extend-client-instagram');
    const composerTriggers = document.querySelectorAll('[data-open-composer]');
    const lastOrderBanner = document.getElementById('last-order-banner');
    const lastOrderLoading = document.getElementById('last-order-loading');
    const lastOrderFound = document.getElementById('last-order-found');
    const lastOrderApplyBtn = document.getElementById('last-order-apply-btn');
    const lastOrderDismissBtn = document.getElementById('last-order-dismiss-btn');
    let pendingLastOrderData = null;
    const commentInput = document.getElementById('order-comment-input');
    const preferencesInput = document.getElementById('order-preferences-input');
    const filterForm = document.getElementById('orders-filter-form');
    const filterCity = document.getElementById('filter-city');
    const filterDeliveryType = document.getElementById('filter-delivery-type');
    const filterSize = document.getElementById('filter-size');
    const resetFiltersBtn = document.getElementById('reset-filters-btn');

    let currentComposerFlow = 'order';
    let currentDeliveryMode = 'courier';
    let isComposerSubmitting = false;
    let isScenarioLocked = false;
    let returnModalInstance = null;
    window.currentOrderId = null;
    window.currentDeliveryId = null;

    const composerContent = {
        order: {
            create: {
                chip: '<i class="bi bi-bag-heart"></i> Замовлення',
                title: 'Нове замовлення',
                description: 'Заповніть контактні дані, графік доставки та параметри букета.',
                footer: '',
                submit: 'Створити замовлення',
            },
            edit: {
                chip: '<i class="bi bi-pencil-square"></i> Редагування',
                title: 'Редагувати замовлення',
                description: 'Оновіть дані отримувача, доставку або параметри букета. Зміни одразу синхронізуються з карткою замовлення.',
                footer: 'Редагування не змінює історію клієнта, а лише оновлює поточне замовлення.',
                submit: 'Зберегти зміни',
            },
        },
        subscription: {
            create: {
                chip: '<i class="bi bi-arrow-repeat"></i> Підписка',
                title: 'Нова підписка',
                description: 'Створіть цикл для клієнта з уже заповненим Instagram.',
                footer: '',
                submit: 'Створити підписку',
            },
            extend: {
                chip: '<i class="bi bi-arrow-repeat"></i> Продовження',
                title: 'Продовження підписки',
                description: 'Параметри взято з попереднього циклу. Оберіть нову дату першої доставки.',
                footer: 'Це створить новий цикл підписки, попередній залишиться в історії.',
                submit: 'Створити продовження',
            },
            edit: {
                chip: '<i class="bi bi-arrow-repeat"></i> Підписка',
                title: 'Редагувати підписку',
                description: 'Оновіть графік або параметри поточної підписки. Дані застосуються до картки замовлення.',
                footer: 'Редагування підписки не створює новий цикл, а змінює наявну конфігурацію.',
                submit: 'Зберегти зміни',
            },
        },
    };

    function clearOrderError() {
        if (!orderErrorBanner) return;
        orderErrorBanner.textContent = '';
        orderErrorBanner.classList.remove('is-visible');
    }

    function ensureDeliveryTypeOption(value, label = value) {
        if (!value) return '';
        const options = Array.from(deliveryTypeSelect.options);
        const existing = options.find(option => option.value === value);
        if (existing) return existing.value;
        const option = document.createElement('option');
        option.value = value;
        option.textContent = label;
        option.dataset.generated = 'true';
        deliveryTypeSelect.appendChild(option);
        return option.value;
    }

    function getDefaultOneTimeType() {
        const options = Array.from(deliveryTypeSelect.options);
        const oneTimeOption = options.find(option => /one[\s-]?time/i.test(option.value) || /разов/i.test(option.textContent || ''));
        if (oneTimeOption) {
            return oneTimeOption.value;
        }
        const testOption = options.find(option => /test/i.test(option.value) || /тест/i.test(option.textContent || ''));
        if (testOption) {
            return testOption.value;
        }
        return ensureDeliveryTypeOption('One-time', 'One-time');
    }

    function syncComposerBackButton() {
        if (!composerBackBtn) return;
        composerBackBtn.classList.toggle('d-none', !returnModalInstance);
    }

    function clearReturnContext() {
        returnModalInstance = null;
        syncComposerBackButton();
    }

    function setReturnContext(modalId = '') {
        const target = modalId ? document.getElementById(modalId) : null;
        returnModalInstance = target ? bootstrap.Modal.getOrCreateInstance(target) : null;
        syncComposerBackButton();
    }

    function showOrderError(message) {
        if (!orderErrorBanner) return;
        orderErrorBanner.textContent = message;
        orderErrorBanner.classList.add('is-visible');
    }

    function syncScenarioButtons() {
        scenarioButtons.forEach(button => {
            const isActive = button.dataset.composerScenario === currentComposerFlow;
            button.classList.toggle('is-active', isActive);
            button.setAttribute('aria-pressed', String(isActive));
            button.disabled = isScenarioLocked;
        });
    }

    function lockScenarioSwitch(locked) {
        isScenarioLocked = locked;
        syncScenarioButtons();
    }

    function setComposerSubmitting(submitting) {
        isComposerSubmitting = submitting;
        orderSubmitBtn.disabled = submitting;
        const state = addOrderForm.getAttribute('data-extend-mode') === 'true'
            ? 'extend'
            : (addOrderForm.getAttribute('data-edit-id') ? 'edit' : 'create');
        orderSubmitBtnText.textContent = submitting
            ? 'Зберігаємо...'
            : composerContent[currentComposerFlow][state].submit;
    }

    function applyComposerCopy(flow, isEditing = false) {
        const state = addOrderForm.getAttribute('data-extend-mode') === 'true'
            ? 'extend'
            : (isEditing ? 'edit' : 'create');
        const content = composerContent[flow][state];
        orderFlowChip.innerHTML = content.chip;
        orderModalTitle.textContent = content.title;
        orderModalDescription.textContent = content.description;
        orderFooterCopy.textContent = content.footer;
        if (!isComposerSubmitting) {
            orderSubmitBtnText.textContent = content.submit;
        }
        deliveryTypeLabel.innerHTML = flow === 'subscription'
            ? '<i class="bi bi-arrow-repeat"></i> Тип підписки <span class="text-red-500">*</span>'
            : '<i class="bi bi-arrow-repeat"></i> Тип доставки <span class="text-red-500">*</span>';
    }

    function syncDeliveryTypeOptions() {
        Array.from(deliveryTypeSelect.options).forEach(option => {
            if (!option.value) {
                option.hidden = false;
                return;
            }
            option.hidden = currentComposerFlow === 'subscription' && !subscriptionTypes.includes(option.value);
        });

        if (currentComposerFlow === 'subscription' && !subscriptionTypes.includes(deliveryTypeSelect.value)) {
            deliveryTypeSelect.value = '';
        }
    }

    function syncScenarioUI(isEditing = false) {
        if (scenarioInput) {
            scenarioInput.value = currentComposerFlow;
        }
        syncScenarioButtons();
        if (scenarioCopy) {
            scenarioCopy.textContent = currentComposerFlow === 'subscription'
                ? 'Підписка створює 4 доставки в межах одного циклу.'
                : 'Разовий сценарій створює одне замовлення й одну доставку.';
        }
        if (deliveryTypeField) {
            deliveryTypeField.classList.toggle('hidden', currentComposerFlow !== 'subscription');
        }
        if (deliveryDayField) {
            deliveryDayField.classList.toggle('hidden', currentComposerFlow !== 'subscription');
        }
        if (deliveryTypeSelect) {
            deliveryTypeSelect.required = currentComposerFlow === 'subscription';
        }
        if (deliveryDaySelect) {
            deliveryDaySelect.required = currentComposerFlow === 'subscription';
        }
        if (firstDeliveryLabel) {
            const isExtendMode = addOrderForm.getAttribute('data-extend-mode') === 'true';
            const showFirstDelivery = currentComposerFlow === 'subscription' && (!isEditing || isExtendMode);
            firstDeliveryLabel.innerHTML = showFirstDelivery
                ? '<i class="bi bi-calendar-event"></i> Перша доставка <span class="text-red-500">*</span>'
                : '<i class="bi bi-calendar-event"></i> Дата доставки <span class="text-red-500">*</span>';
        }
        syncDeliveryTypeOptions();
        if (currentComposerFlow === 'subscription') {
            if (!subscriptionTypes.includes(deliveryTypeSelect.value)) {
                deliveryTypeSelect.value = '';
            }
            if (!isEditing && !deliveryDaySelect.value) {
                deliveryDaySelect.value = 'ПН';
            }
            return;
        }
        if (!isEditing) {
            deliveryTypeSelect.value = getDefaultOneTimeType();
            deliveryDaySelect.value = '';
        }
    }

    function setComposerFlow(flow, isEditing = false) {
        currentComposerFlow = flow;
        applyComposerCopy(flow, isEditing);
        syncScenarioUI(isEditing);
    }

    function setDeliveryMode(mode = 'courier') {
        currentDeliveryMode = mode;

        deliveryModeButtons.forEach(button => {
            const isActive = button.dataset.deliveryMode === mode;
            button.classList.toggle('is-active', isActive);
            button.setAttribute('aria-pressed', String(isActive));
        });

        if (mode === 'pickup') {
            deliveryMethodInput.value = 'courier';
            pickupInput.value = 'on';
            addressInput.value = '';
            addressInput.disabled = true;
            addressInput.removeAttribute('required');
            addressInput.classList.add('input-disabled');
            addressField.classList.add('hidden');
            addressCommentField.classList.add('hidden');
            if (cityField) cityField.classList.add('hidden');
            if (citySelect) { citySelect.removeAttribute('required'); citySelect.value = 'Київ'; }
            addressLabel.innerHTML = '<i class="bi bi-signpost-2"></i> Адреса <span class="text-red-500">*</span>';
            addressInput.placeholder = 'Вулиця, будинок';
            addressHint.textContent = 'Поле приховано, бо для самовивозу адреса не потрібна.';
            deliveryModeHint.textContent = 'Клієнт забере замовлення самостійно, без адреси та маршруту курʼєра.';
            return;
        }

        pickupInput.value = '';
        addressInput.disabled = false;
        addressInput.setAttribute('required', 'required');
        addressInput.classList.remove('input-disabled');
        addressField.classList.remove('hidden');
        if (cityField) cityField.classList.remove('hidden');
        if (citySelect) citySelect.setAttribute('required', 'required');

        if (mode === 'nova_poshta') {
            deliveryMethodInput.value = 'nova_poshta';
            addressCommentField.classList.add('hidden');
            addressLabel.innerHTML = '<i class="bi bi-box-seam"></i> Адреса доставки <span class="text-red-500">*</span>';
            addressInput.placeholder = 'Відділення, поштомат або повна адреса Нової Пошти';
            addressHint.textContent = 'Вкажіть відділення, поштомат або адресу доставки Нової Пошти в одному полі.';
            deliveryModeHint.textContent = 'Для Нової Пошти збережемо той самий маршрутний рядок, але без курʼєрської адресації.';
            return;
        }

        deliveryMethodInput.value = 'courier';
        addressCommentField.classList.remove('hidden');
        addressLabel.innerHTML = '<i class="bi bi-signpost-2"></i> Адреса <span class="text-red-500">*</span>';
        addressInput.placeholder = 'Вулиця, будинок';
        addressHint.textContent = '';
        deliveryModeHint.textContent = '';
    }

    function syncCustomAmountState() {
        if (sizeSelect.value === 'Власний') {
            customAmountDiv.style.display = 'block';
            customAmountInput.required = true;
        } else {
            customAmountDiv.style.display = 'none';
            customAmountInput.required = false;
            customAmountInput.value = '';
        }
    }

    function clearClientResults() {
        clientResults.classList.add('d-none');
        clientResults.innerHTML = '';
    }

    function clearClientInfoBlock() {
        if (clientInfoBlock) {
            clientInfoBlock.classList.add('hidden');
            clientCreditsDisplay.textContent = '—';
            clientDiscountInput.value = '';
        }
        hidePrefillBanner();
    }

    function hidePrefillBanner() {
        if (lastOrderBanner) lastOrderBanner.classList.add('hidden');
        if (lastOrderLoading) lastOrderLoading.classList.remove('hidden');
        if (lastOrderFound) lastOrderFound.classList.add('hidden');
        pendingLastOrderData = null;
    }

    // Set a select value, adding the option dynamically if it doesn't exist yet
    function setSelectValueOrAdd(selectEl, value) {
        if (!selectEl || !value) return;
        const exists = Array.from(selectEl.options).some(opt => opt.value === value);
        if (!exists) {
            const opt = document.createElement('option');
            opt.value = value;
            opt.textContent = value;
            selectEl.appendChild(opt);
        }
        selectEl.value = value;
        selectEl.dispatchEvent(new Event('change'));
    }

    function applyLastOrderPrefill(data) {
        if (!data) return;

        // Delivery mode first (controls visibility/required of address fields)
        if (data.is_pickup) {
            setDeliveryMode('pickup');
        } else if (data.delivery_method === 'nova_poshta') {
            setDeliveryMode('nova_poshta');
        } else {
            setDeliveryMode('courier');
        }

        // Recipient
        const recipientNameInput = addOrderForm.querySelector('[name="recipient_name"]');
        if (recipientNameInput) recipientNameInput.value = data.recipient_name || '';
        if (recipientPhoneInput) recipientPhoneInput.value = data.recipient_phone || '+380';
        const recipientSocialInput = addOrderForm.querySelector('[name="recipient_social"]');
        if (recipientSocialInput) recipientSocialInput.value = data.recipient_social || '';

        // Address
        if (data.city && citySelect) citySelect.value = data.city;
        if (addressInput) addressInput.value = data.street || '';
        if (addressCommentInput) addressCommentInput.value = data.address_comment || '';

        // Size — setSelectValueOrAdd also dispatches change → triggers syncCustomAmountState
        if (data.size) setSelectValueOrAdd(sizeSelect, data.size);
        if (data.custom_amount && customAmountInput) {
            customAmountInput.value = data.custom_amount;
        }

        // For whom
        const forWhomSelect = addOrderForm.querySelector('[name="for_whom"]');
        if (data.for_whom) setSelectValueOrAdd(forWhomSelect, data.for_whom);

        // Notes (comment is intentionally excluded — user fills it fresh each time)
        if (preferencesInput) preferencesInput.value = data.preferences || '';

        // Subscription-specific: only when creating a subscription AND last order was a subscription
        if (data.is_subscription && currentComposerFlow === 'subscription') {
            if (data.delivery_type && deliveryTypeSelect) {
                setSelectValueOrAdd(deliveryTypeSelect, data.delivery_type);
            }
            if (data.delivery_day && deliveryDaySelect) {
                deliveryDaySelect.value = data.delivery_day;
            }
        }
    }

    function toggleDeleteOrderBtn(show) {
        const btn = document.getElementById('delete-order-btn');
        if (!btn) return;
        btn.classList.toggle('hidden', !show);
        btn.classList.toggle('inline-flex', show);
    }

    function resetComposerForm(flow = 'order', clientInstagram = '', options = {}) {
        addOrderForm.reset();
        clearExtraPhones();
        clearClientInfoBlock();
        addOrderForm.removeAttribute('data-edit-id');
        addOrderForm.removeAttribute('data-extend-mode');
        window.currentDeliveryId = null;
        toggleDeleteOrderBtn(false);
        if (extendFromInput) {
            extendFromInput.value = '';
        }
        if (orderClientIdInput) {
            orderClientIdInput.value = '';
        }
        clearOrderError();
        window.currentOrderId = null;
        clearClientResults();
        lockScenarioSwitch(false);
        if (!options.preserveReturnContext) {
            clearReturnContext();
        } else {
            syncComposerBackButton();
        }
        clientSearch.value = clientInstagram;
        setDeliveryMode('courier');
        syncCustomAmountState();
        setComposerFlow(flow, false);
        if (extendHeaderBtn) {
            extendHeaderBtn.classList.add('d-none');
            extendHeaderBtn.removeAttribute('data-order-id');
            extendHeaderBtn.removeAttribute('data-client-instagram');
        }
    }

    function openComposer(flow = 'order', clientInstagram = '') {
        resetComposerForm(flow, clientInstagram);
        addOrderModal.show();
    }

    async function openOrderEditor(orderId, options = {}) {
        if (!orderId) return;
        if (options.returnToModalId) {
            setReturnContext(options.returnToModalId);
        } else {
            clearReturnContext();
        }
        const response = await fetch(`/orders/${orderId}/edit`);
        const orderData = await response.json();
        populateComposerForm(orderData, orderId, {
            preserveReturnContext: Boolean(options.returnToModalId),
            deliveryId: options.deliveryId || null,
            forceOrderTitle: options.forceOrderTitle || false,
        });
    }

    function populateComposerForExtension(orderData, options = {}) {
        resetComposerForm('subscription', orderData.client_instagram, {
            preserveReturnContext: Boolean(options.preserveReturnContext),
        });
        lockScenarioSwitch(true);
        addOrderForm.setAttribute('data-extend-mode', 'true');
        if (extendFromInput) {
            extendFromInput.value = orderData.id || '';
        }
        clientSearch.value = orderData.client_instagram || '';
        addOrderForm.querySelector('[name="recipient_name"]').value = orderData.recipient_name || '';
        recipientPhoneInput.value = orderData.recipient_phone || '+380';
        renderExtraPhones(orderData.additional_phones || []);
        addOrderForm.querySelector('[name="recipient_social"]').value = orderData.recipient_social || '';
        addOrderForm.querySelector('[name="city"]').value = orderData.city || '';
        addressInput.value = orderData.street || '';
        if (addressCommentInput) addressCommentInput.value = orderData.address_comment || '';
        deliveryTypeSelect.value = ensureDeliveryTypeOption(orderData.delivery_type || getDefaultOneTimeType(), orderData.delivery_type || getDefaultOneTimeType());
        sizeSelect.value = orderData.size || '';
        customAmountInput.value = orderData.custom_amount || '';
        addOrderForm.querySelector('[name="first_delivery_date"]').value = '';
        deliveryDaySelect.value = orderData.delivery_day || '';
        addOrderForm.querySelector('[name="time_from"]').value = orderData.time_from || '';
        addOrderForm.querySelector('[name="time_to"]').value = orderData.time_to || '';
        addOrderForm.querySelector('[name="for_whom"]').value = orderData.for_whom || '';
        if (commentInput) commentInput.value = orderData.comment || '';
        if (preferencesInput) preferencesInput.value = orderData.preferences || '';
        if (orderData.is_pickup) {
            setDeliveryMode('pickup');
        } else if (orderData.delivery_method === 'nova_poshta') {
            setDeliveryMode('nova_poshta');
        } else {
            setDeliveryMode('courier');
        }
        syncCustomAmountState();
        setComposerFlow('subscription', true);
        if (extendHeaderBtn) {
            extendHeaderBtn.classList.add('d-none');
            extendHeaderBtn.removeAttribute('data-order-id');
            extendHeaderBtn.removeAttribute('data-client-instagram');
        }
        addOrderModal.show();
    }

    async function openSubscriptionExtension(orderId, options = {}) {
        if (!orderId) return;
        if (options.returnToModalId) {
            setReturnContext(options.returnToModalId);
        } else {
            clearReturnContext();
        }
        const response = await fetch(`/orders/${orderId}/edit`);
        const orderData = await response.json();
        if (!response.ok) {
            throw new Error(orderData.error || 'Не вдалося завантажити підписку');
        }
        populateComposerForExtension(orderData, {
            preserveReturnContext: Boolean(options.returnToModalId),
        });
    }

    async function fetchClientSuggestions(query) {
        const response = await fetch(`/clients/search?q=${encodeURIComponent(query)}`);
        return response.json();
    }

    function bindClientSearch() {
        clientSearch.addEventListener('input', async function() {
            const query = this.value.trim();
            if (query.length < 2) {
                clearClientResults();
                return;
            }

            try {
                const clients = await fetchClientSuggestions(query);
                if (!clients.length) {
                    clearClientResults();
                    return;
                }

                clientResults.innerHTML = clients.map(client =>
                    `<button type="button" class="list-group-item list-group-item-action"
                        data-client-id="${client.id}"
                        data-credits="${client.credits}"
                        data-discount="${client.personal_discount}"
                        data-display="${client.display}">${client.display}</button>`
                ).join('');
                clientResults.classList.remove('d-none');
                clientResults.querySelectorAll('button').forEach(btn => {
                    btn.addEventListener('click', async function() {
                        clientSearch.value = this.getAttribute('data-display') || this.textContent.trim();
                        const clientId = this.getAttribute('data-client-id');
                        if (orderClientIdInput) orderClientIdInput.value = clientId || '';
                        const credits = this.getAttribute('data-credits');
                        const discount = this.getAttribute('data-discount');
                        if (clientInfoBlock) {
                            clientCreditsDisplay.textContent = credits ? `${credits} грн` : '0 грн';
                            clientDiscountInput.value = discount || '';
                            clientInfoBlock.classList.remove('hidden');
                        }
                        clearClientResults();

                        // Show loading state immediately, then fetch last order
                        if (clientId) {
                            hidePrefillBanner();
                            if (lastOrderBanner) lastOrderBanner.classList.remove('hidden');
                            try {
                                const resp = await fetch(`/orders/last-order?client_id=${encodeURIComponent(clientId)}`);
                                const data = await resp.json();
                                if (data.found) {
                                    pendingLastOrderData = data;
                                    if (lastOrderLoading) lastOrderLoading.classList.add('hidden');
                                    if (lastOrderFound) lastOrderFound.classList.remove('hidden');
                                } else {
                                    hidePrefillBanner();
                                }
                            } catch (e) {
                                console.error('Помилка завантаження останнього замовлення:', e);
                                hidePrefillBanner();
                            }
                        }
                    });
                });
            } catch (error) {
                console.error('Помилка пошуку клієнтів:', error);
                clearClientResults();
            }
        });

        clientSearch.addEventListener('blur', function() {
            setTimeout(clearClientResults, 180);
        });
    }

    function sanitizeRecipientPhone() {
        let value = recipientPhoneInput.value.replace(/[^\d+]/g, '');
        if (!value.startsWith('+')) {
            value = `+${value.replace(/^\+/, '')}`;
        }
        recipientPhoneInput.value = value.slice(0, 13);
    }

    function clearExtraPhones() {
        if (extraPhonesContainer) extraPhonesContainer.innerHTML = '';
    }

    function addExtraPhoneRow(value = '') {
        if (!extraPhonesContainer) return;
        const row = document.createElement('div');
        row.className = 'flex items-center gap-1.5 mt-1.5 extra-phone-row';
        row.innerHTML = `
            <input type="text" class="order-input flex-1 extra-phone-input" placeholder="+380XXXXXXXXX" maxlength="13" value="${value || '+380'}">
            <button type="button" class="remove-extra-phone flex-shrink-0 flex items-center justify-center w-8 h-8 rounded-lg border border-stone-200 bg-white text-stone-400 hover:bg-rose-50 hover:border-rose-200 hover:text-rose-500 transition-colors" title="Видалити">
              <i class="bi bi-x text-base"></i>
            </button>`;
        row.querySelector('.remove-extra-phone').addEventListener('click', () => row.remove());
        const input = row.querySelector('.extra-phone-input');
        input.addEventListener('focus', () => { if (!input.value) input.value = '+380'; });
        input.addEventListener('input', () => {
            let v = input.value.replace(/[^\d+]/g, '');
            if (!v.startsWith('+')) v = '+' + v.replace(/^\+/, '');
            input.value = v.slice(0, 13);
        });
        extraPhonesContainer.appendChild(row);
    }

    function renderExtraPhones(phones) {
        clearExtraPhones();
        (phones || []).forEach(ph => { if (ph) addExtraPhoneRow(ph); });
    }

    function clearFieldInvalid(el) {
        el.classList.remove('order-input--invalid', 'order-select--invalid');
    }

    function markRequiredFields() {
        const fields = addOrderForm.querySelectorAll('[required]:not([disabled])');
        let hasInvalid = false;
        fields.forEach(el => {
            const isEmpty = !el.value.trim();
            const invalidClass = (el.tagName === 'SELECT') ? 'order-select--invalid' : 'order-input--invalid';
            if (isEmpty) {
                el.classList.add(invalidClass);
                if (!el._invalidListener) {
                    el._invalidListener = () => clearFieldInvalid(el);
                    el.addEventListener('input', el._invalidListener);
                    el.addEventListener('change', el._invalidListener);
                }
                hasInvalid = true;
            } else {
                clearFieldInvalid(el);
            }
        });
        return hasInvalid;
    }

    async function submitComposerForm(event) {
        event.preventDefault();
        clearOrderError();

        if (markRequiredFields()) {
            showOrderError('Заповніть усі обовʼязкові поля');
            return;
        }

        const phoneValue = recipientPhoneInput.value.trim();
        const phonePattern = /^\+380[0-9]{9}$/;
        if (!phonePattern.test(phoneValue)) {
            showOrderError('Телефон має бути у форматі +380XXXXXXXXX');
            return;
        }

        if (currentDeliveryMode !== 'pickup' && !addressInput.value.trim()) {
            showOrderError(currentDeliveryMode === 'nova_poshta'
                ? 'Вкажіть адресу доставки Нової Пошти'
                : 'Вкажіть адресу або оберіть самовивіз');
            return;
        }

        if (sizeSelect.value === 'Власний' && (!customAmountInput.value || Number(customAmountInput.value) <= 0)) {
            showOrderError('Для власного розміру потрібно вказати суму більше 0');
            return;
        }

        if (currentComposerFlow === 'subscription' && !deliveryTypeSelect.value) {
            showOrderError('Оберіть тип підписки');
            return;
        }

        if (currentComposerFlow === 'subscription' && !deliveryDaySelect.value) {
            showOrderError('Оберіть день доставки для підписки');
            return;
        }

        setComposerSubmitting(true);
        const orderId = addOrderForm.getAttribute('data-edit-id');
        const isEditing = Boolean(orderId);
        const url = isEditing ? `/orders/${orderId}/edit` : '/orders/new';

        try {
            const fd = new FormData(addOrderForm);
            if (extraPhonesContainer) {
                extraPhonesContainer.querySelectorAll('.extra-phone-input').forEach(inp => {
                    const v = inp.value.trim();
                    if (v) fd.append('additional_phones', v);
                });
            }
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'X-Requested-With': 'XMLHttpRequest' },
                body: fd,
            });
            const data = await response.json().catch(() => ({}));

            if (!(response.ok && data.success)) {
                showOrderError(data.error || 'Помилка збереження');
                return;
            }

            addOrderModal.hide();
            const successMessage = isEditing
                ? (currentComposerFlow === 'subscription' ? 'Підписку успішно оновлено!' : 'Замовлення успішно оновлено!')
                : (currentComposerFlow === 'subscription' ? 'Підписку успішно створено!' : 'Замовлення успішно створено!');
            showToast(successMessage, 'success');
            if (data.reschedule_suggestion && typeof window.showRescheduleModal === 'function') {
                window.showRescheduleModal(data.reschedule_suggestion);
            } else {
                setTimeout(() => location.reload(), 900);
            }
        } catch (error) {
            console.error('Помилка збереження:', error);
            showOrderError('Помилка зʼєднання з сервером');
        } finally {
            setComposerSubmitting(false);
        }
    }

    function populateComposerForm(orderData, orderId, options = {}) {
        const flow = subscriptionTypes.includes(orderData.delivery_type) ? 'subscription' : 'order';
        resetComposerForm(flow, orderData.client_instagram, {
            preserveReturnContext: Boolean(options.preserveReturnContext),
        });
        lockScenarioSwitch(true);
        addOrderForm.setAttribute('data-edit-id', orderId);
        clientSearch.value = orderData.client_instagram || '';
        addOrderForm.querySelector('[name="recipient_name"]').value = orderData.recipient_name || '';
        recipientPhoneInput.value = orderData.recipient_phone || '+380';
        renderExtraPhones(orderData.additional_phones || []);
        addOrderForm.querySelector('[name="recipient_social"]').value = orderData.recipient_social || '';
        addOrderForm.querySelector('[name="city"]').value = orderData.city || '';
        addressInput.value = orderData.street || '';
        if (addressCommentInput) addressCommentInput.value = orderData.address_comment || '';
        deliveryTypeSelect.value = ensureDeliveryTypeOption(orderData.delivery_type || getDefaultOneTimeType(), orderData.delivery_type || getDefaultOneTimeType());
        sizeSelect.value = orderData.size || '';
        customAmountInput.value = orderData.custom_amount || '';
        addOrderForm.querySelector('[name="first_delivery_date"]').value = orderData.first_delivery_date || '';
        deliveryDaySelect.value = orderData.delivery_day || '';
        addOrderForm.querySelector('[name="time_from"]').value = orderData.time_from || '';
        addOrderForm.querySelector('[name="time_to"]').value = orderData.time_to || '';
        addOrderForm.querySelector('[name="for_whom"]').value = orderData.for_whom || '';
        if (commentInput) commentInput.value = orderData.comment || '';
        if (preferencesInput) preferencesInput.value = orderData.preferences || '';
        if (orderData.is_pickup) {
            setDeliveryMode('pickup');
        } else if (orderData.delivery_method === 'nova_poshta') {
            setDeliveryMode('nova_poshta');
        } else {
            setDeliveryMode('courier');
        }
        syncCustomAmountState();
        window.currentDeliveryId = options.deliveryId || null;
        setComposerFlow(flow, true);
        if (options.forceOrderTitle && orderModalTitle) {
            orderModalTitle.textContent = 'Редагувати замовлення';
        }

        if (extendHeaderBtn) {
            if (flow === 'subscription' && orderData.can_extend_subscription) {
                extendHeaderBtn.classList.remove('d-none');
                extendHeaderBtn.setAttribute('data-order-id', orderId);
                extendHeaderBtn.setAttribute('data-client-instagram', orderData.client_instagram);
            } else {
                extendHeaderBtn.classList.add('d-none');
            }
        }

        toggleDeleteOrderBtn(true);
        addOrderModal.show();
    }

    function maybeLaunchComposerFromQuery() {
        const params = new URLSearchParams(window.location.search);
        const compose = params.get('compose');
        const clientInstagram = params.get('client_instagram') || '';

        if (compose !== 'subscription') {
            return;
        }

        openComposer('subscription', clientInstagram);
        params.delete('compose');
        params.delete('client_instagram');
        const nextQuery = params.toString();
        history.replaceState({}, document.title, `${window.location.pathname}${nextQuery ? `?${nextQuery}` : ''}`);
    }

    bindClientSearch();

    if (lastOrderApplyBtn) {
        lastOrderApplyBtn.addEventListener('click', function() {
            applyLastOrderPrefill(pendingLastOrderData);
            hidePrefillBanner();
        });
    }
    if (lastOrderDismissBtn) {
        lastOrderDismissBtn.addEventListener('click', hidePrefillBanner);
    }

    setDeliveryMode('courier');
    syncCustomAmountState();
    setComposerFlow('order', false);

    if (addExtraPhoneBtn) {
        addExtraPhoneBtn.addEventListener('click', () => addExtraPhoneRow());
    }

    recipientPhoneInput.addEventListener('focus', function() {
        if (!recipientPhoneInput.value) {
            recipientPhoneInput.value = '+380';
        }
    });
    recipientPhoneInput.addEventListener('input', sanitizeRecipientPhone);
    sizeSelect.addEventListener('change', syncCustomAmountState);
    addOrderForm.addEventListener('submit', submitComposerForm);

    deliveryModeButtons.forEach(button => {
        button.addEventListener('click', function() {
            setDeliveryMode(this.dataset.deliveryMode || 'courier');
        });
    });

    scenarioButtons.forEach(button => {
        button.addEventListener('click', function() {
            if (isScenarioLocked) return;
            const nextFlow = this.dataset.composerScenario || 'order';
            setComposerFlow(nextFlow, false);
        });
    });

    if (commentInput) {
        commentInput.addEventListener('input', function() {
            if (this.value.length > 1000) this.value = this.value.slice(0, 1000);
        });
    }
    if (preferencesInput) {
        preferencesInput.addEventListener('input', function() {
            if (this.value.length > 1000) this.value = this.value.slice(0, 1000);
        });
    }

    composerTriggers.forEach(trigger => {
        trigger.addEventListener('click', function() {
            openComposer(this.dataset.openComposer || 'order', this.dataset.clientInstagram || '');
        });
    });

    window.orderComposerApi = {
        openComposer,
        openOrderEditor,
        openSubscriptionExtension,
    };

    if (composerBackBtn) {
        composerBackBtn.addEventListener('click', function() {
            if (!returnModalInstance) return;
            addOrderModalElement.addEventListener('hidden.bs.modal', function handleReturn() {
                addOrderModalElement.removeEventListener('hidden.bs.modal', handleReturn);
                if (returnModalInstance) {
                    returnModalInstance.show();
                }
            });
            addOrderModal.hide();
        });
    }

    document.querySelectorAll('[data-order-edit]').forEach(trigger => {
        trigger.addEventListener('click', async function() {
            const orderId = this.getAttribute('data-order-edit');
            if (!orderId) return;
            try {
                await openOrderEditor(orderId);
            } catch (error) {
                showToast('Помилка завантаження даних замовлення', 'error');
            }
        });
    });

    document.querySelectorAll('[data-order-id][data-order-editable="true"]').forEach(card => {
        card.addEventListener('dblclick', async function() {
            const orderId = this.getAttribute('data-order-id');
            if (!orderId) return;
            try {
                await openOrderEditor(orderId);
            } catch (error) {
                showToast('Помилка завантаження даних замовлення', 'error');
            }
        });
    });

    document.querySelectorAll('.extend-subscription-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            window.currentOrderId = this.getAttribute('data-order-id');
            if (extendClientInstagram) {
                extendClientInstagram.textContent = this.getAttribute('data-client-instagram') || '';
            }
            if (extendModal) {
                extendModal.show();
            }
        });
    });

    if (confirmExtendBtn) {
        confirmExtendBtn.addEventListener('click', async function() {
            const orderId = window.currentOrderId;
            if (!orderId) return;

            try {
                const response = await fetch(`/orders/${orderId}/extend-subscription`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                });
                const data = await response.json();

                if (data.success) {
                    if (extendModal) extendModal.hide();
                    showToast('Підписку успішно продовжено!', 'success');
                    setTimeout(() => location.reload(), 900);
                } else {
                    showToast(`Помилка: ${data.error || 'Невідома помилка'}`, 'error');
                }
            } catch (error) {
                showToast('Помилка зʼєднання з сервером', 'error');
            }
        });
    }

    if (extendHeaderBtn) {
        extendHeaderBtn.addEventListener('click', function() {
            window.currentOrderId = this.getAttribute('data-order-id');
            if (extendClientInstagram) {
                extendClientInstagram.textContent = this.getAttribute('data-client-instagram') || '';
            }
            if (extendModal) {
                extendModal.show();
            }
        });
    }

    if (filterCity && filterForm) {
        filterCity.addEventListener('change', function() {
            filterForm.submit();
        });
    }
    if (filterDeliveryType && filterForm) {
        filterDeliveryType.addEventListener('change', function() {
            filterForm.submit();
        });
    }
    if (filterSize && filterForm) {
        filterSize.addEventListener('change', function() {
            filterForm.submit();
        });
    }
    if (resetFiltersBtn) {
        resetFiltersBtn.addEventListener('click', function() {
            window.location.href = '/orders';
        });
    }

    maybeLaunchComposerFromQuery();

    const deleteOrderBtn = document.getElementById('delete-order-btn');
    const deleteOrderConfirmModalEl = document.getElementById('deleteOrderConfirmModal');
    const confirmDeleteOrderBtn = document.getElementById('confirm-delete-order-btn');
    const deleteOrderDepsInfo = document.getElementById('delete-order-deps-info');
    const deleteOrderConfirmModal = deleteOrderConfirmModalEl
        ? bootstrap.Modal.getOrCreateInstance(deleteOrderConfirmModalEl)
        : null;

    if (deleteOrderBtn && deleteOrderConfirmModal) {
        deleteOrderBtn.addEventListener('click', async function () {
            const orderId = addOrderForm.getAttribute('data-edit-id');
            if (!orderId) return;

            const deliveryId = window.currentDeliveryId;
            const depsUrl = deliveryId
                ? `/orders/deliveries/${deliveryId}/dependencies`
                : `/orders/${orderId}/dependencies`;

            let deps = { deliveries_count: 0, routes: [] };
            try {
                const resp = await fetch(depsUrl);
                if (resp.ok) deps = await resp.json();
            } catch (e) { /* show modal anyway */ }

            const lines = [];
            lines.push(`<p>Буде видалено <strong>${deps.deliveries_count}</strong> доставк${deps.deliveries_count === 1 ? 'у' : deps.deliveries_count < 5 ? 'и' : 'ок'}.</p>`);
            if (deps.routes && deps.routes.length > 0) {
                lines.push('<p class="mt-2 font-medium text-red-600"><i class="bi bi-exclamation-triangle me-1"></i>Замовлення входить до маршрутів:</p>');
                lines.push('<ul class="mt-1 space-y-1 pl-1">');
                deps.routes.forEach(r => {
                    lines.push(`<li class="flex items-center gap-2"><i class="bi bi-geo-alt text-stone-400"></i><span>Маршрут #${r.id} — ${r.date}, кур'єр: ${r.courier} (${r.status})</span></li>`);
                });
                lines.push('</ul>');
            }
            if (deleteOrderDepsInfo) deleteOrderDepsInfo.innerHTML = lines.join('');

            if (confirmDeleteOrderBtn) {
                confirmDeleteOrderBtn.dataset.orderId = orderId;
                confirmDeleteOrderBtn.dataset.deliveryId = deliveryId || '';
            }

            deleteOrderConfirmModal.show();
        });
    }

    if (confirmDeleteOrderBtn) {
        confirmDeleteOrderBtn.addEventListener('click', async function () {
            const deliveryId = this.dataset.deliveryId;
            const orderId = this.dataset.orderId;
            const deleteUrl = deliveryId
                ? `/orders/deliveries/${deliveryId}/delete`
                : `/orders/${orderId}/delete`;
            if (!deleteUrl) return;
            try {
                const resp = await fetch(deleteUrl, { method: 'POST' });
                const data = await resp.json().catch(() => ({}));
                if (!resp.ok || !data.success) {
                    if (deleteOrderConfirmModal) deleteOrderConfirmModal.hide();
                    alert(data.error || 'Не вдалося видалити замовлення');
                    return;
                }
                if (deleteOrderConfirmModal) deleteOrderConfirmModal.hide();
                addOrderModal.hide();
                showToast('Замовлення видалено', 'success');
                setTimeout(() => location.reload(), 900);
            } catch (e) {
                alert('Помилка зʼєднання');
            }
        });
    }

    // ── Certificate validation ──────────────────────────────────────────
    const certCodeInput = document.getElementById('order-cert-code-input');
    const certValidateBtn = document.getElementById('cert-validate-btn');
    const certResult = document.getElementById('cert-result');
    const certHiddenInput = document.getElementById('order-certificate-code');

    function clearCertificate() {
        if (certCodeInput) certCodeInput.value = '';
        if (certHiddenInput) certHiddenInput.value = '';
        if (certResult) {
            certResult.classList.add('hidden');
            certResult.className = 'hidden rounded-2xl border px-4 py-3 text-sm';
            certResult.innerHTML = '';
        }
    }

    // Clear certificate when form resets
    const origReset = resetComposerForm;
    // Patch: clear cert on every reset
    addOrderModalElement.addEventListener('hidden.bs.modal', clearCertificate);

    if (certCodeInput) {
        certCodeInput.addEventListener('input', function() {
            // Clear validated state when user changes the code
            if (certHiddenInput) certHiddenInput.value = '';
            if (certResult) certResult.classList.add('hidden');
        });
        certCodeInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); certValidateBtn && certValidateBtn.click(); }
        });
    }

    if (certValidateBtn) {
        certValidateBtn.addEventListener('click', async function() {
            const code = (certCodeInput ? certCodeInput.value : '').trim();
            if (!code) {
                certResult.className = 'rounded-2xl border border-red-200 bg-red-50 text-red-700 px-4 py-3 text-sm';
                certResult.innerHTML = '<i class="bi bi-exclamation-circle me-1"></i>Введіть код сертифіката';
                certResult.classList.remove('hidden');
                return;
            }
            certValidateBtn.disabled = true;
            certValidateBtn.textContent = '...';
            try {
                const resp = await fetch('/certificates/validate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code}),
                });
                const data = await resp.json();
                if (data.valid) {
                    certHiddenInput.value = data.code;

                    // Auto-fill form fields based on certificate type
                    if (data.type === 'amount') {
                        // Set size to "Власний" and fill custom amount
                        if (sizeSelect) {
                            sizeSelect.value = 'Власний';
                            sizeSelect.dispatchEvent(new Event('change'));
                        }
                        if (customAmountInput && data.value_amount) {
                            customAmountInput.value = data.value_amount;
                        }
                    } else if (data.type === 'size') {
                        // Set size
                        if (sizeSelect && data.value_size) {
                            sizeSelect.value = data.value_size;
                            sizeSelect.dispatchEvent(new Event('change'));
                        }
                    } else if (data.type === 'subscription') {
                        // Switch scenario to subscription if not already
                        setComposerFlow('subscription', false);
                        // Clear delivery type — admin chooses manually
                        if (deliveryTypeSelect) deliveryTypeSelect.value = '';
                        // Set size
                        if (sizeSelect && data.value_size) {
                            sizeSelect.value = data.value_size;
                            sizeSelect.dispatchEvent(new Event('change'));
                        }
                    }

                    certResult.className = 'rounded-2xl border border-emerald-200 bg-emerald-50 text-emerald-800 px-4 py-3 text-sm';
                    certResult.innerHTML = `<div class="flex items-start gap-2">
                      <i class="bi bi-check-circle-fill text-emerald-500 mt-0.5"></i>
                      <div>
                        <span class="font-semibold">${data.type_display}</span>: ${data.value_display}
                        <span class="text-emerald-600 ml-2 text-xs">· діє до ${data.expires_at}</span>
                        <p class="text-xs text-emerald-700 mt-0.5 opacity-75">Параметри підтягнуто автоматично — можна редагувати</p>
                      </div>
                    </div>`;
                } else {
                    certHiddenInput.value = '';
                    certResult.className = 'rounded-2xl border border-red-200 bg-red-50 text-red-700 px-4 py-3 text-sm';
                    certResult.innerHTML = `<i class="bi bi-x-circle me-1"></i>${data.error}`;
                }
                certResult.classList.remove('hidden');
            } catch(e) {
                certResult.className = 'rounded-2xl border border-red-200 bg-red-50 text-red-700 px-4 py-3 text-sm';
                certResult.innerHTML = '<i class="bi bi-exclamation-circle me-1"></i>Помилка з\'єднання';
                certResult.classList.remove('hidden');
            } finally {
                certValidateBtn.disabled = false;
                certValidateBtn.textContent = 'Перевірити';
            }
        });
    }
});
</script>
