{% extends "layout.html" %}

{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">Розподіл доставок</h1>
  </div>

  <div class="row">
    <!-- Ліва колонка -->
    <div class="col-md-4">
      <div class="card">
        <div class="card-header">
          <h5>Не розподілені доставки</h5>
        </div>
        <div class="card-body">
          <p>{{ unassigned_deliveries|length }} доставок</p>
        </div>
      </div>
    </div>

    <!-- Права колонка -->
    <div class="col-md-8">
      
      <!-- Тест кур'єрів -->
      <div class="mb-3">
        <div class="card border-0 shadow-sm mb-3">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0">ТЕСТ: Влад</h5>
          </div>
          <div class="card-body">
            <p>Блок кур'єра Влад</p>
          </div>
        </div>

        <div class="card border-0 shadow-sm mb-3">
          <div class="card-header bg-danger text-white">
            <h5 class="mb-0">ТЕСТ: Паша</h5>
          </div>
          <div class="card-body">
            <p>Блок кур'єра Паша</p>
          </div>
        </div>

        <div class="card border-0 shadow-sm mb-3">
          <div class="card-header bg-success text-white">
            <h5 class="mb-0">ТЕСТ: Дарія</h5>
          </div>
          <div class="card-body">
            <p>Блок кур'єра Дарія</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}
