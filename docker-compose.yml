version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kvitkova_crm
      POSTGRES_USER: kvitkova_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kvitkova_password}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kvitkova_user -d kvitkova_crm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: .
    ports:
      - "8002:8000"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./scripts:/app/scripts
      - ./instance:/app/instance
      - ./logs:/app/logs
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DATABASE_URL=postgresql://kvitkova_user:${POSTGRES_PASSWORD:-kvitkova_password}@postgres:5432/kvitkova_crm
      - DEPOT_ADDRESS=${DEPOT_ADDRESS:-}
      - ROUTE_OPTIMIZER_URL=${ROUTE_OPTIMIZER_URL:-}
      - OPTIMIZER_API_KEY=${OPTIMIZER_API_KEY:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@kvitkovapovnya.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  telegram-bot:
    build: .
    volumes:
      - ./app:/app/app
      - ./instance:/app/instance
      - ./logs:/app/logs
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DATABASE_URL=postgresql://kvitkova_user:${POSTGRES_PASSWORD:-kvitkova_password}@postgres:5432/kvitkova_crm
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: ["python3", "scripts/run_telegram_bot.py"]

# Volumes are now managed via local directories

networks:
  default:
    driver: bridge 