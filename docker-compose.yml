version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8002:8000"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./scripts:/app/scripts
      - ./instance:/app/instance
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      FLASK_APP: run.py
      FLASK_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DEPOT_ADDRESS: ${DEPOT_ADDRESS:-}
      ROUTE_OPTIMIZER_URL: ${ROUTE_OPTIMIZER_URL:-}
      OPTIMIZER_API_KEY: ${OPTIMIZER_API_KEY:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@kvitkovapovnya.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL}
      AI_MODEL: ${AI_MODEL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  telegram-bot:
    build: .
    volumes:
      - ./app:/app/app
      - ./instance:/app/instance
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: ["python3", "scripts/run_telegram_bot.py"]

networks:
  default:
    driver: bridge
