name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: version
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          echo "tag=${LATEST_TAG}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd /apps/crm

            git fetch --tags

            LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)

            if [ -z "$LATEST_TAG" ]; then
              echo "❌ No tags found!"
              exit 1
            fi

            echo "🚀 Deploying $LATEST_TAG"

            git checkout $LATEST_TAG

            docker compose up -d --build

            sleep 8

            curl -f https://povnyacrm.duckdns.org/auth/login

      - name: Notify Telegram (success)
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d text="🚀 PROD Deploy SUCCESS ${{ steps.version.outputs.tag }} | https://povnyacrm.duckdns.org"

      - name: Notify Telegram (fail)
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d text="❌ Deploy FAILED | Check GitHub Actions"