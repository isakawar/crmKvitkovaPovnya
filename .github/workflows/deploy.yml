name: Deploy to Server

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "🚀 Starting deployment for tag: ${{ github.ref_name }}"
          
          cd /home/isakawar1/crmKvitkovaPovnya
          
          # Отримуємо останні зміни
          echo "📥 Fetching latest changes..."
          git fetch --tags
          git pull origin main
          git checkout ${{ github.ref_name }}
          
          # Створюємо .env файл
          echo "⚙️ Creating .env file..."
          cat > .env << EOF
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          FLASK_ENV=production
          FLASK_APP=run.py
          PYTHONUNBUFFERED=1
          VERSION=${{ github.ref_name }}
          EOF
          
          # Перевіряємо .env файл
          echo " .env file content:"
          cat .env
          
          # Даємо права на виконання скрипту
          chmod +x scripts/docker-deploy.sh
          
          # Запускаємо скрипт розгортання
          echo "🔧 Running docker-deploy.sh..."
          ./scripts/docker-deploy.sh
          
          # Додаткова перевірка
          echo "📊 Final container status:"
          docker-compose ps
          
          echo "📋 Recent logs:"
          docker-compose logs --tail=20
          
          echo "✅ Deployment completed successfully!"