name: Deploy to Server

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "🚀 Starting deployment for tag: ${{ github.ref_name }}"
          
          cd /home/isakawar1/crmKvitkovaPovnya
          
          # Отримуємо останні зміни
          echo "📥 Fetching latest changes..."
          git fetch --tags
          git pull origin main
          
          # Переключаємося на тег
          echo "️ Switching to tag: ${{ github.ref_name }}"
          git checkout ${{ github.ref_name }}
          
          # Створюємо .env файл
          echo "⚙️ Creating .env file..."
          cat > .env << EOF
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          FLASK_ENV=production
          FLASK_APP=run.py
          PYTHONUNBUFFERED=1
          VERSION=${{ github.ref_name }}
          EOF
          
          echo "📦 Stopping old containers..."
          docker-compose down || true
          
          echo "🔨 Building new containers..."
          docker-compose build --no-cache
          
          echo "🚀 Starting new containers..."
          docker-compose up -d
          
          # Чекаємо поки контейнери запустяться
          sleep 15
          
          echo "📊 Container status:"
          docker-compose ps
          
          echo "📋 Recent logs:"
          docker-compose logs --tail=20
          
          echo "�� Cleaning up Docker cache..."
          docker system prune -f
          
          echo "✅ Deployment completed successfully!"
