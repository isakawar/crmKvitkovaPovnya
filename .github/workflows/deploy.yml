name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd /apps/crm

            git fetch --tags

            LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)

            if [ -z "$LATEST_TAG" ]; then
              echo "❌ No tags found!"
              exit 1
            fi

            echo "TAG=$LATEST_TAG" >> $GITHUB_ENV

            git checkout $LATEST_TAG

            docker compose up -d --build

            sleep 8

            if curl -f https://povnyacrm.duckdns.org/health; then
              echo "DEPLOY_STATUS=success" >> $GITHUB_ENV
            else
              echo "DEPLOY_STATUS=fail" >> $GITHUB_ENV
              exit 1
            fi

      # 🔥 SUCCESS MESSAGE
      - name: Notify Telegram (success)
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d text="🚀 Deploy SUCCESS

Tag: ${{ env.TAG }}
URL: https://povnyacrm.duckdns.org
Status: ✅ OK"

      # 💥 FAIL MESSAGE
      - name: Notify Telegram (fail)
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TG_CHAT_ID }} \
            -d text="❌ Deploy FAILED

Tag: ${{ env.TAG }}
Check logs in GitHub Actions!"